# Canonical pre-commit configuration for all factory repositories.
# Synced byte-identical to all downstream repos via /_sync-governance.
# See SubscriptionFactory.md §Commit-Time Enforcement Requirements [Normative].
#
# Hook types: pre-commit, commit-msg, prepare-commit-msg, pre-push.
# All hooks are local — no external fetch at runtime (Zero Trust supply chain).
# Vendored scripts live in vendor/hooks/.
#
# Enforcement level: hooks at informational level warn but exit 0.
# Promote to hard gate by changing exit codes per §Phased Enforcement Architecture.

repos:
  - repo: local
    hooks:
      # ===================================================================
      # PRE-COMMIT HOOKS (commit-time enforcement requirements 1-7, 9-12)
      # ===================================================================

      # --- Universal checks (all repos) ---

      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: sed -i 's/[[:space:]]*$//'
        language: system
        types: [text]
        stages: [pre-commit]

      - id: end-of-file-fixer
        name: fix end of file
        entry: bash -c 'for f in "$@"; do [ -n "$(tail -c1 "$f")" ] && echo >> "$f"; done'
        language: system
        types: [text]
        stages: [pre-commit]

      - id: check-yaml
        name: check yaml syntax
        entry: python -c "import sys, yaml; yaml.safe_load(open(sys.argv[1]))"
        language: system
        types: [yaml]
        stages: [pre-commit]

      - id: check-json
        name: check json syntax
        entry: python -c "import sys, json; json.load(open(sys.argv[1]))"
        language: system
        types: [json]
        stages: [pre-commit]

      # --- Secrets scanning (req 4 — hard gate from initial deployment) ---

      - id: detect-secrets
        name: detect secrets
        entry: vendor/hooks/detect-secrets.sh
        language: script
        types: [text]
        stages: [pre-commit]

      # --- Protected-file change detection (req 5 — informational) ---

      - id: protected-file-check
        name: check protected files
        entry: vendor/hooks/protected-file-check.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      # --- Suppression detection (req 10 — informational) ---

      - id: no-suppressions
        name: check for lint/type suppressions
        entry: vendor/hooks/no-suppressions.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]

      # --- Python checks (activate when .py files are staged) ---

      - id: python-compile
        name: python compile check
        entry: python -m py_compile
        language: system
        types: [python]
        stages: [pre-commit]

      # --- PowerShell checks (activate when .ps1 files are staged) ---

      - id: powershell-syntax
        name: powershell syntax check
        entry: pwsh -NoProfile -Command "foreach ($f in $args) { $null = [System.Management.Automation.Language.Parser]::ParseFile($f, [ref]$null, [ref]$errors); if ($errors) { $errors | ForEach-Object { Write-Error $_ }; exit 1 } }"
        language: system
        files: '\.(ps1|psm1|psd1)$'
        stages: [pre-commit]

      # --- PHP checks (activate when .php files are staged) ---

      - id: php-syntax
        name: php syntax check
        entry: php -l
        language: system
        files: '\.php$'
        stages: [pre-commit]

      # ===================================================================
      # COMMIT-MSG HOOK (commit-time enforcement requirement 8 — hard gate)
      # ===================================================================

      - id: conventional-commit
        name: validate conventional commit message
        entry: vendor/hooks/conventional-commit.sh
        language: script
        stages: [commit-msg]

      # ===================================================================
      # PREPARE-COMMIT-MSG HOOK (reduces agent re-commit cycles)
      # ===================================================================

      - id: prepare-commit-template
        name: pre-fill commit template
        entry: vendor/hooks/prepare-commit-template.sh
        language: script
        stages: [prepare-commit-msg]

      # ===================================================================
      # PRE-PUSH HOOK (defense-in-depth — catches --no-verify bypasses)
      # ===================================================================

      - id: pre-push-verify
        name: pre-push verification
        entry: vendor/hooks/pre-push-verify.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [pre-push]
