name: Change Request
description: Propose new or changed functionality.
labels: ["change-request"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Functional problem
      description: What is broken or missing, and why it matters.
    validations:
      required: true
  - type: textarea
    id: scenarios
    attributes:
      label: Solution scenarios
      description: Multiple technical approaches with trade-offs. Added during Design solution phase.
    validations:
      required: false
  - type: textarea
    id: recommendation
    attributes:
      label: Recommended scenario
      description: Winning scenario with reasoning. Added during Design solution phase.
    validations:
      required: false
  - type: textarea
    id: workflow
    attributes:
      label: Workflow checklist
      description: "Issue lifecycle tracking (see workflow-reference.md §Workflow checklist)."
      value: |
        ### 1. Triage
        - [ ] 1a. Problem statement written
        - [ ] 1b. Relevance confirmed (not duplicate, not obsolete, not out of scope)
        - [ ] 1c. Category set (Bug, CR, or Refactoring)
        - [ ] 1d. Priority set

        ### 2. Author FD
        - [ ] 2a. functional-design.md produced (per current template)
        - [ ] 2b. HM approved **(HM)**

        ### 3. Review FD
        - [ ] 3a. functional-design.md validated (per current template)
        - [ ] 3b. HM approved **(HM)**

        ### 4. Author TD
        - [ ] 4a. architecture.md + operations.md produced (per current template)
        - [ ] 4b. HM approved **(HM)**

        ### 5. Review TD
        - [ ] 5a. architecture.md + operations.md validated (per current template)
        - [ ] 5b. HM approved **(HM)**

        ### 6. Author plan
        - [ ] 6a. (CR/Refactoring) Dependencies mapped between implementation units
        - [ ] 6b. (CR/Refactoring) Critical path identified
        - [ ] 6c. (CR/Refactoring) Feasibility verified
        - [ ] 6d. Effort estimated
        - [ ] 6e. Board issues created/updated/deleted
        - [ ] 6f. In-flight change registry checked
        - [ ] 6g. HM approved **(HM)**

        ### 7. Review plan
        - [ ] 7a. Plan completeness verified
        - [ ] 7b. Collision check performed against in-flight registry
        - [ ] 7c. HM approved **(HM)**

        ### 8. Author impl
        - [ ] 8a. Code completed (all plan-manifest functions implemented)
        - [ ] 8b. Test coverage verified (100% statement coverage on modules in coverage scope)
        - [ ] 8c. Documentation updated (README.md, architecture.md, operations.md as applicable)
        - [ ] 8d. Local enforcement checks passed
        - [ ] 8e. PR created

        ### 9. Review impl
        - [ ] 9a. CI passed
        - [ ] 9b. Gemini review handled (each comment addressed or dismissed with rationale, marked resolved)
        - [ ] 9c. PR merged
        - [ ] 9d. Release workflow passed (if applicable)
        - [ ] 9e. /_repo-check passed
        - [ ] 9f. Delivery accepted **(HM)** (UAT result + decision record in PR description: what, why, edge cases handled/deferred, risks)
        - [ ] 9g. In-flight registry entry removed
        - [ ] 9h. Branch deleted
    validations:
      required: false
