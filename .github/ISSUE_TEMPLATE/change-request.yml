name: Change Request
description: Propose new or changed functionality.
labels: ["change-request"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Functional problem
      description: What is broken or missing, and why it matters.
    validations:
      required: true
  - type: textarea
    id: scenarios
    attributes:
      label: Solution scenarios
      description: Multiple technical approaches with trade-offs. Added during Design solution phase.
    validations:
      required: false
  - type: textarea
    id: recommendation
    attributes:
      label: Recommended scenario
      description: Winning scenario with reasoning. Added during Design solution phase.
    validations:
      required: false
  - type: textarea
    id: workflow
    attributes:
      label: Workflow checklist
      description: "Issue lifecycle tracking (see workflow-reference.md §Workflow checklist)."
      value: |
        ### 1. Triage intake
        - [ ] 1a. Problem statement written
        - [ ] 1b. Relevance confirmed (not duplicate, not obsolete, not out of scope)
        - [ ] 1c. Type set (Bug, CR, or Refactoring)
        - [ ] 1d. Priority set

        ### 2. Design function
        - [ ] 2a. functional-design.md section: Product vision stated (problem statement, purpose, phase scope)
        - [ ] 2b. functional-design.md section: Business constraints documented (with source traceability)
        - [ ] 2c. functional-design.md section: User stories defined (Connextra format, INVEST-compliant, with acceptance criteria including edge cases)
        - [ ] 2d. functional-design.md section: Functional requirements numbered (FR-xxx per subsystem, with acceptance criteria)
        - [ ] 2e. functional-design.md section: UX requirements specified (user flows, interaction patterns, information architecture)
        - [ ] 2f. functional-design.md section: Non-functional requirements documented
        - [ ] 2g. functional-design.md section: Conceptual data model defined (entities, relationships, value policies)
        - [ ] 2h. functional-design.md section: Scope defined (in/out with reasoning per item to prevent repeated assessment)
        - [ ] 2i. functional-design.md section: Open questions resolved
        - [ ] 2j. functional-design.md section: Security requirements documented (data classification, compliance constraints, access control requirements, trust boundaries)
        - [ ] 2k. HM approved **(HM)**

        ### 3. Validate function
        - [ ] 3a. Design reviewed against codebase evidence
        - [ ] 3b. Completeness assessed (all status 2 deliverables)
        - [ ] 3c. HM approved **(HM)**

        ### 4. Design solution
        - [ ] 4a. architecture.md section: Bounded architecture slice declared (modules permitted, modules excluded, cooperating interfaces)
        - [ ] 4b. architecture.md section: Component responsibilities documented
        - [ ] 4c. architecture.md section: Data flow documented
        - [ ] 4d. architecture.md section: Public interfaces documented
        - [ ] 4e. architecture.md section: Failure-mode inventory enumerated
        - [ ] 4f. architecture.md section: Design alternatives evaluated (if non-trivial; at least one alternative with trade-off rationale)
        - [ ] 4g. architecture.md section: Function manifest completed (all functions from architecture mapped to implementation units)
        - [ ] 4h. operations.md created or updated
        - [ ] 4i. architecture.md section: Security-by-design assessment documented (threat model, trust boundary enforcement, secret management, dependency policy, attack surface minimization, input/output validation)
        - [ ] 4j. HM approved **(HM)**

        ### 5. Validate solution
        - [ ] 5a. Architecture reviewed against codebase evidence
        - [ ] 5b. Completeness assessed (all status 4 deliverables)
        - [ ] 5c. HM approved **(HM)**

        ### 6. Plan implementation
        - [ ] 6a. Dependencies mapped between implementation units
        - [ ] 6b. Critical path identified
        - [ ] 6c. Feasibility verified
        - [ ] 6d. Effort estimated
        - [ ] 6e. Board issues created/updated/deleted
        - [ ] 6f. In-flight change registry checked
        - [ ] 6g. HM approved **(HM)**

        ### 7. Validate plan
        - [ ] 7a. Plan completeness verified
        - [ ] 7b. Collision check performed against in-flight registry
        - [ ] 7c. HM approved **(HM)**

        ### 8. Implement changes
        - [ ] 8a. Code completed (all plan-manifest functions implemented)
        - [ ] 8b. Test coverage verified (100% statement coverage on modules in coverage scope)
        - [ ] 8c. Documentation updated (README.md, architecture.md, operations.md as applicable)
        - [ ] 8d. Local enforcement checks passed
        - [ ] 8e. PR created

        ### 9. Validate implementation
        - [ ] 9a. CI passed
        - [ ] 9b. Gemini review handled (each comment addressed or dismissed with rationale, marked resolved)
        - [ ] 9c. PR merged
        - [ ] 9d. Release workflow passed (if applicable)
        - [ ] 9e. /_repo-check passed
        - [ ] 9f. Delivery accepted **(HM)** (UAT result + decision record in PR description: what, why, edge cases handled/deferred, risks)
        - [ ] 9g. In-flight registry entry removed
        - [ ] 9h. Branch deleted
    validations:
      required: false
