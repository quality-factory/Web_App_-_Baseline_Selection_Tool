name: Bug
description: Report existing functionality that is broken or degraded.
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Functional problem
      description: What is broken or degraded? Include steps to reproduce if applicable.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Where does this occur?
      placeholder: |
        - OS:
        - Runtime version:
        - Passes in CI: yes / no
    validations:
      required: false
  - type: textarea
    id: likely-cause
    attributes:
      label: Likely root cause
      description: If known, describe the suspected cause.
    validations:
      required: false
  - type: textarea
    id: workflow
    attributes:
      label: Workflow checklist
      description: "Issue lifecycle tracking (see workflow-reference.md §Workflow checklist). Bugs may skip statuses 2–7 when the fix is self-evident (HM documents skip rationale)."
      value: |
        ### 1. Triage
        - [ ] 1a. Problem statement written
        - [ ] 1b. Relevance confirmed (not duplicate, not obsolete, not out of scope)
        - [ ] 1c. Category set (Bug, CR, or Refactoring)
        - [ ] 1d. Priority set

        ### 2. Author FD
        _May be skipped for bugs when the fix is self-evident (HM documents skip rationale)._
        - [ ] 2a. functional-design.md produced (per current template)
        - [ ] 2b. HM approved **(HM)**

        ### 3. Review FD
        _May be skipped for bugs when the fix is self-evident (HM documents skip rationale)._
        - [ ] 3a. functional-design.md validated (per current template)
        - [ ] 3b. HM approved **(HM)**

        ### 4. Author TD
        _May be skipped for bugs when the fix is self-evident (HM documents skip rationale)._
        - [ ] 4a. architecture.md + operations.md produced (per current template)
        - [ ] 4b. HM approved **(HM)**

        ### 5. Review TD
        _May be skipped for bugs when the fix is self-evident (HM documents skip rationale)._
        - [ ] 5a. architecture.md + operations.md validated (per current template)
        - [ ] 5b. HM approved **(HM)**

        ### 6. Author plan
        _May be skipped for bugs when the fix is self-evident (HM documents skip rationale)._
        - [ ] 6d. Effort estimated
        - [ ] 6e. Board issues created/updated/deleted
        - [ ] 6f. In-flight change registry checked
        - [ ] 6g. HM approved **(HM)**

        ### 7. Review plan
        _May be skipped for bugs when the fix is self-evident (HM documents skip rationale)._
        - [ ] 7a. Plan completeness verified
        - [ ] 7b. Collision check performed against in-flight registry
        - [ ] 7c. HM approved **(HM)**

        ### 8. Author impl
        - [ ] 8a. Code completed (all plan-manifest functions implemented)
        - [ ] 8b. Test coverage verified (100% statement coverage on modules in coverage scope)
        - [ ] 8c. Documentation updated (README.md, architecture.md, operations.md as applicable)
        - [ ] 8d. Local enforcement checks passed
        - [ ] 8e. PR created

        ### 9. Review impl
        - [ ] 9a. CI passed
        - [ ] 9b. Gemini review handled (each comment addressed or dismissed with rationale, marked resolved)
        - [ ] 9c. PR merged
        - [ ] 9d. Release workflow passed (if applicable)
        - [ ] 9e. /_repo-check passed
        - [ ] 9f. Delivery accepted **(HM)** (UAT result + decision record in PR description: what, why, edge cases handled/deferred, risks)
        - [ ] 9g. In-flight registry entry removed
        - [ ] 9h. Branch deleted
    validations:
      required: false
